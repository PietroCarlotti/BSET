# _pkgdown.yml
template:
  bootstrap: 5
  bslib:
    toc: true           # floating Table of Contents for articles
    code-bg: "#f7f7f7" # background for code blocks
    code-color: "#333"  # default text color in code blocks

highlight: tango      # base syntax highlighting (closest to RStudio)

navbar:
  structure:
    left:  [reference, articles]
    right: [github]

articles:
  - title: "Tutorial"
    contents:
      - BSET_tutorial

# Include your custom CSS for finer control of code colors
# This loads pkgdown/extra.css automatically
css:
  - pkgdown/extra.css
